<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        /* Estilos generales */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: white;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 1.5em;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 1.5em;
        }
        
        label {
            display: block;
            margin-bottom: 0.5em;
            font-weight: bold;
            color: #555;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.75em;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        
        .error {
            color: red;
            font-size: 0.875em;
            margin-top: 0.5em;
            display: none;
        }
        
        button {
            width: 100%;
            padding: 0.75em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        /* Media queries para responsividad */
        @media (max-width: 600px) {
            .container {
                padding: 1.5em;
                margin: 1em;
            }
            h2 {
                font-size: 1.5em;
            }
            input, button {
                font-size: 0.9em;
            }
        }
        
        @media (min-width: 601px) and (max-width: 1024px) {
            .container {
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registro de Usuario</h2>
        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre">
                <div class="error" id="errorNombre">El nombre es obligatorio.</div>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido">
                <div class="error" id="errorApellido">El apellido es obligatorio.</div>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <div class="error" id="errorEmail">Ingresa un email válido.</div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password">
                <div class="error" id="errorPassword">La contraseña debe tener al menos 8 caracteres.</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
                <div class="error" id="errorConfirmPassword">Las contraseñas no coinciden.</div>
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>

    <script>
        // Función de validación
        function validarFormulario(event) {
            event.preventDefault(); // Evita el envío del formulario si hay errores
            
            let esValido = true;
            
            // Limpiar errores previos
            document.querySelectorAll('.error').forEach(error => error.style.display = 'none');
            
            // Validar nombre
            const nombre = document.getElementById('nombre').value.trim();
            if (nombre === '') {
                document.getElementById('errorNombre').style.display = 'block';
                esValido = false;
            }
            
            // Validar apellido
            const apellido = document.getElementById('apellido').value.trim();
            if (apellido === '') {
                document.getElementById('errorApellido').style.display = 'block';
                esValido = false;
            }
            
            // Validar email
            const email = document.getElementById('email').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('errorEmail').style.display = 'block';
                esValido = false;
            }
            
            // Validar contraseña
            const password = document.getElementById('password').value;
            if (password.length < 8) {
                document.getElementById('errorPassword').style.display = 'block';
                esValido = false;
            }
            
            // Validar confirmación de contraseña
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                document.getElementById('errorConfirmPassword').style.display = 'block';
                esValido = false;
            }
            
            // Si todo es válido, simular envío (puedes reemplazar con lógica real)
            if (esValido) {
                alert('Registro exitoso. ¡Bienvenido!');
                // Aquí podrías enviar los datos a un servidor, por ejemplo, con fetch()
            }
        }
        
        // Asignar evento al formulario
        document.getElementById('registroForm').addEventListener('submit', validarFormulario);
    </script>
</body>
</html>
